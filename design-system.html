<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Centsible · Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #FBF4EC;
    color: #3A2E26;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body.dark {
    background: #1D1A20;
    color: #F2EBE0;
  }
  ::-webkit-scrollbar { width: 0; height: 0; }

  .ds-page { max-width: 1280px; margin: 0 auto; padding: 56px 48px 120px; }

  /* HERO */
  .ds-hero {
    display: grid; grid-template-columns: 1.3fr 1fr; gap: 48px; align-items: end;
    padding-bottom: 44px; margin-bottom: 56px;
    border-bottom: 1px solid rgba(58,46,38,0.09);
  }
  body.dark .ds-hero { border-bottom-color: rgba(255,246,230,0.08); }
  .ds-eyebrow {
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 11px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: #7A6A5F;
  }
  body.dark .ds-eyebrow { color: #BCB0A3; }
  .ds-title {
    font-family: 'Newsreader', serif; font-weight: 500;
    font-size: 84px; line-height: 0.95; letter-spacing: -1.2px;
    margin: 14px 0 18px;
  }
  .ds-title em { font-style: italic; opacity: 0.6; }
  .ds-lede {
    font-family: 'Newsreader', serif; font-size: 20px; font-style: italic;
    line-height: 1.55; color: #7A6A5F; max-width: 520px;
  }
  body.dark .ds-lede { color: #BCB0A3; }

  .ds-hero-logo {
    aspect-ratio: 1; border-radius: 32px; padding: 32px;
    background: #F3E9DB;
    box-shadow: 0 20px 40px rgba(62,45,30,0.08), 0 1px 2px rgba(62,45,30,0.04);
    display: flex; align-items: center; justify-content: center; position: relative;
    overflow: hidden;
  }

  /* SECTION */
  .ds-section { margin-bottom: 88px; }
  .ds-section-head {
    display: flex; align-items: baseline; gap: 16px; margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(58,46,38,0.09);
  }
  body.dark .ds-section-head { border-bottom-color: rgba(255,246,230,0.08); }
  .ds-section-num {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
    color: #A89A8C; letter-spacing: 1px;
  }
  body.dark .ds-section-num { color: #827668; }
  .ds-section-title {
    font-family: 'Newsreader', serif; font-weight: 500; font-size: 42px;
    line-height: 1; letter-spacing: -0.5px; margin: 0;
  }
  .ds-section-sub {
    font-family: 'Newsreader', serif; font-style: italic; font-size: 16px;
    color: #7A6A5F; margin-left: auto; max-width: 360px; text-align: right;
  }
  body.dark .ds-section-sub { color: #BCB0A3; }

  /* CARD containers for specimens */
  .ds-specimen-grid { display: grid; gap: 16px; }
  .ds-card {
    background: #FFFBF5; border-radius: 24px; padding: 22px;
    box-shadow: 0 6px 20px rgba(62,45,30,0.06), 0 1px 2px rgba(62,45,30,0.04);
    border: 1px solid rgba(58,46,38,0.09);
  }
  body.dark .ds-card {
    background: #27232D; border-color: rgba(255,246,230,0.08);
    box-shadow: 0 6px 20px rgba(0,0,0,0.28);
  }

  .ds-card-title {
    font-family: 'Nunito'; font-weight: 700; font-size: 11px; letter-spacing: 1.2px;
    text-transform: uppercase; color: #7A6A5F; margin-bottom: 4px;
  }
  body.dark .ds-card-title { color: #BCB0A3; }
  .ds-card-name {
    font-family: 'Newsreader', serif; font-weight: 500; font-size: 22px;
    line-height: 1.15; margin-bottom: 6px; letter-spacing: -0.2px;
  }
  .ds-card-desc {
    font-family: 'Newsreader', serif; font-style: italic; font-size: 13.5px;
    color: #7A6A5F; line-height: 1.5; margin-bottom: 14px;
  }
  body.dark .ds-card-desc { color: #BCB0A3; }
  .ds-code {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #A89A8C; margin-top: 10px;
  }
  body.dark .ds-code { color: #827668; }

  /* THEME TOGGLE */
  .ds-top-controls {
    position: fixed; top: 24px; right: 24px; z-index: 100;
    display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
  }
  .ds-theme-toggle {
    display: flex; gap: 0; padding: 4px; background: #FFFBF5;
    border-radius: 999px; border: 1px solid rgba(58,46,38,0.12);
    box-shadow: 0 6px 16px rgba(62,45,30,0.08);
    font-family: 'Nunito'; font-size: 12px; font-weight: 700;
  }
  body.dark .ds-theme-toggle {
    background: #27232D; border-color: rgba(255,246,230,0.1);
    box-shadow: 0 6px 16px rgba(0,0,0,0.4);
  }
  .ds-theme-toggle button {
    padding: 8px 16px; border-radius: 999px; border: none;
    background: transparent; cursor: pointer; color: inherit;
    font: inherit;
  }
  .ds-theme-toggle button.active {
    background: #3A2E26; color: #FFFBF5;
  }
  body.dark .ds-theme-toggle button.active {
    background: #F2EBE0; color: #1D1A20;
  }

  /* section jump */
  .ds-jump { position: relative; width: 280px; }
  .ds-jump-btn {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-radius: 999px;
    background: #FFFBF5; border: 1px solid rgba(58,46,38,0.12);
    box-shadow: 0 6px 16px rgba(62,45,30,0.08);
    font-family: 'Nunito'; font-size: 12px; font-weight: 700;
    color: #3A2E26; cursor: pointer; text-align: left;
  }
  body.dark .ds-jump-btn { background: #27232D; color: #F2EBE0; border-color: rgba(255,246,230,0.1); box-shadow: 0 6px 16px rgba(0,0,0,0.4); }
  .ds-jump-btn .chev { font-family: 'JetBrains Mono'; font-size: 11px; opacity: 0.6; }
  .ds-jump-panel {
    position: absolute; top: calc(100% + 6px); right: 0; width: 340px;
    background: #FFFBF5; border-radius: 18px; padding: 10px;
    border: 1px solid rgba(58,46,38,0.12);
    box-shadow: 0 16px 40px rgba(62,45,30,0.16);
    z-index: 101;
  }
  body.dark .ds-jump-panel { background: #27232D; border-color: rgba(255,246,230,0.1); box-shadow: 0 16px 40px rgba(0,0,0,0.5); }
  .ds-jump-panel input {
    width: 100%; box-sizing: border-box; padding: 10px 14px; border-radius: 12px;
    border: 1px solid rgba(58,46,38,0.09); background: rgba(58,46,38,0.04);
    outline: none; font-family: 'Nunito'; font-size: 13px; font-weight: 500;
    color: inherit; margin-bottom: 8px;
  }
  body.dark .ds-jump-panel input { border-color: rgba(255,246,230,0.08); background: rgba(255,246,230,0.04); }
  .ds-jump-panel input:focus { border-color: #E09978; background: rgba(240,160,110,0.08); }
  .ds-jump-list { max-height: 360px; overflow-y: auto; }
  .ds-jump-item {
    display: flex; align-items: baseline; gap: 12px;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    font-family: 'Nunito'; font-size: 13px; font-weight: 600;
    color: inherit;
  }
  .ds-jump-item:hover, .ds-jump-item.hl { background: rgba(240,160,110,0.14); }
  body.dark .ds-jump-item:hover, body.dark .ds-jump-item.hl { background: rgba(240,160,110,0.16); }
  .ds-jump-item .num { font-family: 'JetBrains Mono'; font-size: 10px; color: #A89A8C; min-width: 28px; }
  .ds-jump-item .sub { font-family: 'Newsreader', serif; font-style: italic; font-size: 12px; color: #7A6A5F; margin-left: auto; }
  body.dark .ds-jump-item .sub { color: #BCB0A3; }
  .ds-jump-empty { padding: 16px; font-family: 'Newsreader', serif; font-style: italic; font-size: 13px; color: #7A6A5F; text-align: center; }

  /* COLOR SWATCH GRID */
  .ds-palette {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px;
  }
  .ds-palette-head {
    font-family: 'Newsreader', serif; font-weight: 500; font-size: 20px;
    margin-bottom: 10px; letter-spacing: -0.2px;
  }
  .ds-palette-tag {
    font-family: 'JetBrains Mono', mono; font-size: 10px; color: #A89A8C;
    margin-bottom: 14px;
  }
  body.dark .ds-palette-tag { color: #827668; }
  .ds-swatch-set { display: flex; flex-direction: column; gap: 6px; }
  .ds-swatch-row {
    display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center;
    padding: 10px 12px; background: rgba(58,46,38,0.025); border-radius: 12px;
  }
  body.dark .ds-swatch-row { background: rgba(255,246,230,0.03); }
  .ds-swatch-block {
    display: flex; align-items: center; gap: 10px;
  }
  .ds-swatch-chip {
    width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
    border: 1px solid rgba(58,46,38,0.08);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
  }
  .ds-swatch-name {
    font-family: 'Nunito'; font-weight: 700; font-size: 13px;
  }
  .ds-swatch-role {
    font-family: 'Newsreader', serif; font-style: italic; font-size: 12px;
    color: #7A6A5F; display: block;
  }
  body.dark .ds-swatch-role { color: #BCB0A3; }
  .ds-swatch-code {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #A89A8C;
    text-align: right; white-space: nowrap;
  }
  body.dark .ds-swatch-code { color: #827668; }

  .ds-wash-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
  }
  .ds-wash-chip {
    height: 110px; border-radius: 20px; padding: 14px;
    display: flex; flex-direction: column; justify-content: space-between;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
  }
  .ds-wash-label {
    font-family: 'Nunito'; font-weight: 800; font-size: 11px;
    text-transform: uppercase; letter-spacing: 1px; color: #3A2E26;
  }
  .ds-wash-desc {
    font-family: 'Newsreader', serif; font-style: italic; font-size: 12px;
    color: #3A2E26; opacity: 0.75;
  }

  /* TYPE SPECIMEN */
  .ds-type-stack { display: flex; flex-direction: column; gap: 32px; }
  .ds-type-row {
    display: grid; grid-template-columns: 200px 1fr; gap: 32px;
    padding: 24px 0; border-top: 1px dashed rgba(58,46,38,0.12);
    align-items: baseline;
  }
  body.dark .ds-type-row { border-top-color: rgba(255,246,230,0.1); }
  .ds-type-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #7A6A5F; line-height: 1.7;
  }
  body.dark .ds-type-meta { color: #BCB0A3; }
  .ds-type-meta b { color: #3A2E26; font-weight: 700; display: block; font-size: 12px; }
  body.dark .ds-type-meta b { color: #F2EBE0; }
  .ds-type-sample { letter-spacing: -0.2px; }

  /* GRID layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  /* Atomic / composed specimen container */
  .ds-demo {
    padding: 32px 24px;
    border-radius: 20px;
    background: rgba(58,46,38,0.025);
    display: flex; align-items: center; justify-content: center; gap: 14px;
    flex-wrap: wrap; min-height: 120px;
  }
  body.dark .ds-demo { background: rgba(255,246,230,0.03); }

  .ds-glyph-grid {
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px;
  }
  .ds-glyph-cell {
    aspect-ratio: 1; border-radius: 14px; background: #FFFBF5;
    border: 1px solid rgba(58,46,38,0.09);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 8px;
  }
  body.dark .ds-glyph-cell {
    background: #27232D; border-color: rgba(255,246,230,0.08);
  }
  .ds-glyph-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: #A89A8C;
  }
  body.dark .ds-glyph-label { color: #827668; }

  /* widget size indicators */
  .ds-size-tag {
    display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px;
    padding: 2px 8px; border-radius: 999px; background: rgba(58,46,38,0.08);
    color: #7A6A5F; letter-spacing: 0.5px; margin-left: 6px;
  }
  body.dark .ds-size-tag { background: rgba(255,246,230,0.08); color: #BCB0A3; }

  .ds-widget-wrap {
    background: #FBF4EC; border-radius: 24px; padding: 16px;
  }
  body.dark .ds-widget-wrap { background: #1D1A20; }

  .widget-col-1 { grid-column: span 1; }
  .widget-col-2 { grid-column: span 2; }

  .ds-widgets-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

  /* Spacing cards */
  .ds-spacing-row {
    display: grid; grid-template-columns: 120px 1fr auto; gap: 16px; align-items: center;
    padding: 14px 0; border-bottom: 1px dashed rgba(58,46,38,0.1);
  }
  body.dark .ds-spacing-row { border-bottom-color: rgba(255,246,230,0.08); }
  .ds-spacing-bar { height: 12px; background: #F4C7A8; border-radius: 6px; }
  .ds-spacing-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .ds-spacing-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #A89A8C; }
  body.dark .ds-spacing-val { color: #827668; }

  /* Radii demo */
  .ds-radii-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .ds-radii-chip {
    aspect-ratio: 1; background: linear-gradient(155deg, #FBE3D1, #F4C7A8);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
  }
  .ds-radii-chip .nm { font-family: 'Nunito'; font-weight: 800; font-size: 12px; color: #3A2E26; }
  .ds-radii-chip .vl { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #7A6A5F; }

  /* Shadow demo */
  .ds-shadow-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .ds-shadow-chip {
    background: #FFFBF5; border-radius: 20px; padding: 24px;
    border: 1px solid rgba(58,46,38,0.06);
    display: flex; flex-direction: column; gap: 6px;
  }
  body.dark .ds-shadow-chip {
    background: #27232D; border-color: rgba(255,246,230,0.06);
  }
  .ds-shadow-nm { font-family: 'Nunito'; font-weight: 800; font-size: 13px; }
  .ds-shadow-vl { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #A89A8C; line-height: 1.5; }
  body.dark .ds-shadow-vl { color: #827668; }

  /* Logo grid */
  .ds-logo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .ds-logo-cell {
    aspect-ratio: 1; border-radius: 22px; display: flex; align-items: center; justify-content: center;
    position: relative;
  }

</style>
</head>
<body>

<div class="ds-top-controls">
  <div class="ds-theme-toggle">
    <button id="btn-light" class="active" onclick="setTheme('light')">☀ light</button>
    <button id="btn-dark" onclick="setTheme('dark')">☾ dark</button>
  </div>
  <div id="jump-root"></div>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="logo-marks.jsx"></script>
<script type="text/babel" src="widgets.jsx"></script>
<script type="text/babel" src="pockets.jsx"></script>

<script>
  function setTheme(t) {
    document.body.classList.toggle('dark', t === 'dark');
    document.getElementById('btn-light').classList.toggle('active', t === 'light');
    document.getElementById('btn-dark').classList.toggle('active', t === 'dark');
    window.__theme = t;
    window.dispatchEvent(new CustomEvent('themechange'));
  }
  window.__theme = 'light';
</script>

<script type="text/babel" src="ds-sections.jsx"></script>
<script type="text/babel" src="ds-sections-2.jsx"></script>

<script type="text/babel">
  // Mount the jump dropdown after sections render
  setTimeout(() => {
    const root = document.getElementById('jump-root');
    if (root && window.JumpDropdown) {
      ReactDOM.createRoot(root).render(<JumpDropdown />);
    }
  }, 300);
</script>

</body>
</html>
